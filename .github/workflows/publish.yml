name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write
  pages: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@^11.10.0

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build CLI (required for subprocess CLI tests)
        run: npm run build

      - name: Run test suite
        run: npm test

      - name: Verify adapter templates
        run: npx vitest run src/__tests__/adapter-templates.test.ts

      - name: Bump version and push tag (manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          npm version ${{ inputs.bump }} -m "chore: release %s"
          git push --follow-tags

      - name: Verify tag matches package version (tag push)
        if: github.event_name == 'push'
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PACKAGE_VERSION" != "$TAG_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match package.json version ($PACKAGE_VERSION)."
            exit 1
          fi

      - name: Extract version
        id: extract
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Publish to npm with OIDC
        run: npm publish

      - name: Notify syntaur-app
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.SYNTAUR_APP_DISPATCH_PAT }}
          repository: prong-horn/syntaur-app
          event-type: syntaur-published
          client-payload: '{"version": "${{ steps.extract.outputs.version }}"}'

  # Generate the Agent Skills v0.2.0 discovery index from skills/ and deploy it
  # (plus the per-skill artifacts) to GitHub Pages, so `npx skills add
  # https://prong-horn.github.io/syntaur` resolves + content-verifies Syntaur
  # skills over HTTP. Runs only after `release` (its full test suite is the
  # drift gate) and in the SAME run for both triggers, so it never depends on
  # the bot-pushed tag re-triggering a workflow.
  #
  # One-time prerequisite: enable Pages with Source = GitHub Actions
  #   gh api -X POST repos/prong-horn/syntaur/pages -f build_type=workflow
  # (configure-pages `enablement: true` below also attempts this when the token
  # has pages: write).
  pages:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Generate .well-known skills index
        run: node scripts/build-skills-index.mjs --out-dir _site/.well-known/agent-skills

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
