name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@^11.10.0

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build CLI (required for subprocess CLI tests)
        run: npm run build

      - name: Run test suite
        run: npm test

      - name: Verify adapter templates
        run: npx vitest run src/__tests__/adapter-templates.test.ts

      - name: Bump version and push tag (manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          npm version ${{ inputs.bump }} -m "chore: release %s"
          git push --follow-tags

      - name: Verify tag matches package version (tag push)
        if: github.event_name == 'push'
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PACKAGE_VERSION" != "$TAG_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match package.json version ($PACKAGE_VERSION)."
            exit 1
          fi

      - name: Extract version
        id: extract
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Publish to npm with OIDC
        run: npm publish

      - name: Notify syntaur-app
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.SYNTAUR_APP_DISPATCH_PAT }}
          repository: prong-horn/syntaur-app
          event-type: syntaur-published
          client-payload: '{"version": "${{ steps.extract.outputs.version }}"}'
